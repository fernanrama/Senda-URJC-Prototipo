<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Senda URJC - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-body">
    <main class="auth-container">
        <section class="auth-card">
            <div class="logo-placeholder">Logo URJC</div>
            <h1>Senda URJC</h1>
            <p class="subtitle">Inicia sesión con tu correo institucional</p>

            {% if error %}
                <div class="alert alert-error">{{ error }}</div>
            {% endif %}

            <form method="post" class="auth-form" action="{{ url_for('login') }}">
                <label for="email">Correo institucional</label>
                <input type="email" id="email" name="email" placeholder="usuario@urjc.es" required>

                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="********" required>

                <button type="submit" class="btn btn-primary">Acceder</button>
            </form>
        </section>
    </main>
</body>
</html>
